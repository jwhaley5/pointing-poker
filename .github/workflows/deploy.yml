name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select the environment
        required: true
        default: prod
        type: choice
        options:
          - prod
          - qa

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            shared/package-lock.json

      - name: Resolve SST stage
        run: |
          case "${{ inputs.environment }}" in
            prod)
              echo "SST_STAGE=production" >> "$GITHUB_ENV"
              ;;
            *)
              echo "SST_STAGE=${{ inputs.environment }}" >> "$GITHUB_ENV"
              ;;
          esac
        shell: bash

      - name: Install root dependencies
        run: npm ci

      - name: Install shared dependencies
        working-directory: shared
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: pointing_poker_deployment_session

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy with SST
        run: npx sst deploy --stage "${SST_STAGE}"

      - name: Publish deploy outputs
        run: |
          {
            echo "## SST Outputs"
            echo
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Environment: ${{ inputs.environment }}"
            echo "- Stage: ${SST_STAGE}"
            echo
            echo '```json'
            cat .sst/outputs.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
